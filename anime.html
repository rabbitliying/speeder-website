<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世必得动漫插画预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A2018; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; color: #E8F2EC; min-height: 100vh; padding: 40px 20px; }
.container { max-width: 900px; margin: 0 auto; }
h1 { text-align: center; font-size: 24px; color: #5A8C6A; margin-bottom: 40px; letter-spacing: 4px; }
.section { margin-bottom: 60px; }
.section-title { font-size: 14px; color: #5A8C6A; letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; }
.section img { width: 100%; border-radius: 12px; display: block; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.desc { font-size: 13px; color: rgba(200,230,201,0.6); margin-top: 12px; line-height: 1.7; }
</style>
</head>
<body>
<div class="container">
<h1>世必得科技 · 动漫风格插画</h1>

<div class="section">
<div class="section-title">SD-WAN · 多分支组网</div>
<img src="anime_sdwan_v2_1.png" alt="SD-WAN">
<div class="desc">少年在窗前工作，双显示器呈现网络拓扑图，窗外是连绵山景与金色光线</div>
</div>

<div class="section">
<div class="section-title">线路融合池 · 带宽聚合</div>
<img src="anime_pool_1.png" alt="线路融合池">
<div class="desc">少年站在山顶，俯瞰能量光线从四面八方汇聚成发光节点</div>
</div>

<div class="section">
<div class="section-title">安全堆栈 · 立体防护</div>
<img src="anime_security_v2.png" alt="安全堆栈">
<div class="desc">少女在全息数字盾牌前，周围悬浮着多层安全模块</div>
</div>

<div class="section">
<div class="section-title">全球服务 · 跨国互联</div>
<img src="anime_global_1.png" alt="全球服务">
<div class="desc">少年在屋顶凝视发光地球，蓝色数据流连接各大洲</div>
</div>

</div>
</body>
</html>
